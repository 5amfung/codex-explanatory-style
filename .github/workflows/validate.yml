name: validate

on:
  pull_request:
  push:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Validate hook wiring JSON
        run: python3 -m json.tool hooks.json >/dev/null

      - name: Validate release-please config JSON
        run: python3 -m json.tool release-please-config.json >/dev/null

      - name: Validate release-please manifest JSON
        run: python3 -m json.tool .release-please-manifest.json >/dev/null

      - name: Validate hook shell syntax
        run: sh -n hooks/session-start

      - name: Validate hook output contract
        run: ./hooks/session-start | python3 -c 'import json,sys; payload=json.load(sys.stdin); output=payload["hookSpecificOutput"]; assert output["hookEventName"] == "SessionStart"; assert output["additionalContext"]'
